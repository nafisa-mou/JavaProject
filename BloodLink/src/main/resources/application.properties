spring.application.name=bloodlink
spring.profiles.active=dev

# ============ SERVER CONFIGURATION ============
server.port=8080
server.servlet.context-path=/api

# ============ DATABASE CONFIGURATION ============
spring.datasource.url=jdbc:mysql://localhost:3306/bloodlink_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============ JPA & HIBERNATE CONFIGURATION ============
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============ CONNECTION POOLING ============
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ============ JWT CONFIGURATION ============
app.jwt.secret=your-super-secret-key-change-this-in-production-environment-very-important-security-key-at-least-256-bits
app.jwt.expiration=86400000
app.jwt.refresh-token-expiration=604800000

# ============ LOGGING CONFIGURATION ============
logging.level.root=INFO
logging.level.com.bloodlink=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# ============ FILE UPLOAD CONFIGURATION ============
file.upload-dir=uploads/
file.max-size=10485760

# ============ MAIL CONFIGURATION ============
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============ WEBSOCKET CONFIGURATION ============
spring.websocket.url=/ws

# ============ JACKSON CONFIGURATION ============
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# ============ ACTUATOR CONFIGURATION ============
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized

# Spring Boot Application Configuration for BloodLink
spring.application.name=bloodlink
spring.profiles.active=dev

# ==================== Server Configuration ====================
server.port=8080
server.servlet.context-path=/
server.servlet.session.timeout=30m

# ==================== Database Configuration ====================
spring.datasource.url=jdbc:mysql://localhost:3306/bloodlink_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== Hikari Connection Pool ====================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ==================== JWT Configuration ====================
# IMPORTANT: Change this in production! Use a strong, random key (256+ bits)
app.jwt.secret=ThisIsAVeryLongSecureSecretKeyForJWTTokenSigningWithAtLeast256BitsOfEntropyForMaximumSecurityChangeInProduction
app.jwt.expiration=86400000
app.jwt.refresh-token-expiration=604800000

# ==================== Security Configuration ====================
# Spring Security
spring.security.user.name=admin
spring.security.user.password=admin123

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*,Authorization
spring.web.cors.allow-credentials=true

# ==================== Email Configuration ====================
# SMTP Server
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.from=noreply@bloodlink.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email configuration
app.mail.from-name=BloodLink
app.base-url=http://localhost:3000
spring.web.cors.max-age=43200

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.bloodlink=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data=DEBUG
logging.level.org.hibernate=WARN

logging.file.name=logs/bloodlink.log
logging.file.max-size=10MB
logging.file.max-history=10
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ==================== Jackson Configuration ====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# ==================== WebSocket Configuration ====================
spring.websocket.servlet.prefix=/ws
server.tomcat.web-socket.max-text-message-buffer-size=8192
server.tomcat.web-socket.max-binary-message-buffer-size=8192

# ==================== Application Metadata ====================
app.version=1.0.0
app.description=AI-powered Blood Donor & Patient Connection Platform

# ==================== Actuator Configuration ====================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoints.web.base-path=/actuator

# Metrics Configuration
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.logback=true
management.metrics.enable.hikaricp=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Prometheus Configuration
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=when-authorized

# ==================== Error Handling ====================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ==================== Performance Tuning ====================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.compression.enabled=true
server.compression.min-response-size=1024

# ==================== File Upload Configuration ====================
file.upload-dir=uploads/
file.max-size=10485760

# ==================== Mail Configuration ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============ WEBSOCKET CONFIGURATION ============
spring.websocket.url=/ws

# ============ JACKSON CONFIGURATION ============
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# ============ ACTUATOR CONFIGURATION ============
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
